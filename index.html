<!DOCTYPE html>
<html>
<head>
<title>VishavX ULTIMATE</title>

<style>
body{margin:0;background:black;color:#0f0;font-family:monospace;text-align:center;overflow:hidden;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
#panel{position:fixed;left:0;top:0;font-size:12px;color:lime;padding:10px;text-align:left;}
.glitch{animation:glitch .5s infinite;}
@keyframes glitch{
0%{text-shadow:2px 2px red;}
50%{text-shadow:-2px -2px lime;}
100%{text-shadow:2px -2px blue;}
}
button,input{padding:10px;margin:5px;background:black;color:lime;border:1px solid lime;}
</style>

</head>
<body>

<canvas id="matrix"></canvas>
<div id="panel"></div>

<div id="intro"></div>

<div id="main" style="display:none;">
<h2 class="glitch">VISHAVX SYSTEM</h2>

<p>Type <b>vishav</b> to open menu</p>

<input id="key" maxlength="20" placeholder="Enter code">
<div id="typingMsg"></div>
<button onclick="checkKey()">Confirm</button>

<div id="msg"></div>

<br>

<input id="chatInput" placeholder="Ask AI">
<button onclick="askAI()">Send</button>
<div id="chat"></div>

<br>

<video id="cam" autoplay width="200"></video>

<br>

<div id="loc"></div>
</div>

<div id="more" style="display:none;">
<h2>MORE MENU</h2>
<button onclick="startDownload()">Accept</button>
<button onclick="back()">Back</button>
</div>

<script>

// ===== VOICE =====
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang="en-US";s.rate=0.9;s.pitch=1;
speechSynthesis.speak(s);
}

// ===== INTRO =====
let lines=["Initializing system...","Loading modules...","Accessing core...","System ready..."];
let i=0,j=0;
function introAnim(){
if(i<lines.length){
if(j<lines[i].length){
intro.innerHTML+=lines[i][j];
j++;setTimeout(introAnim,40);
}else{
intro.innerHTML+="<br>";
i++;j=0;setTimeout(introAnim,300);
}}}
introAnim();

setTimeout(()=>{
intro.style.display="none";
main.style.display="block";
loadInfo();
speak("System ready");
},4000);

// ===== MATRIX =====
let c=matrix,ctx=c.getContext("2d");
c.height=innerHeight;c.width=innerWidth;
let letters="01".split(""),drops=[];
for(let x=0;x<c.width/14;x++)drops[x]=1;

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0F0";
drops.forEach((y,i)=>{
ctx.fillText(letters[Math.random()*2|0],i*14,y);
drops[i]=y>c.height||Math.random()>0.975?0:y+14;
});
},33);

// ===== REAL DATA =====
async function loadInfo(){
let battery="Unknown";
if(navigator.getBattery){
let b=await navigator.getBattery();
battery=Math.floor(b.level*100)+"%";
}

let connection=navigator.connection?.effectiveType||"Unknown";

panel.innerHTML=`
ACCESSING SYSTEM...<br>
Device: ${navigator.platform}<br>
CPU: ${navigator.hardwareConcurrency}<br>
RAM: ${navigator.deviceMemory||"?"} GB<br>
Network: ${connection}<br>
Screen: ${screen.width}x${screen.height}<br>
Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}<br>
Battery: ${battery}<br>
Time: ${new Date().toLocaleTimeString()}
`;
}

// ===== MEMORY =====
function remember(){
localStorage.setItem("tries",(parseInt(localStorage.getItem("tries")||0)+1));
}

// ===== BLOCK =====
function isBlocked(){
let block=localStorage.getItem("blockUntil");
if(block && Date.now()<block){
countdown();
return true;
}
return false;
}

function countdown(){
let end=parseInt(localStorage.getItem("blockUntil"));
let int=setInterval(()=>{
let r=end-Date.now();
if(r<=0){
clearInterval(int);
localStorage.removeItem("blockUntil");
msg.innerHTML="Unlocked";
return;
}
msg.innerHTML=`🔒 BLOCKED<br>${Math.floor(r/60000)}m ${Math.floor(r%60000/1000)}s`;
},1000);
}

// ===== TYPING =====
key.addEventListener("input",()=>{
typingMsg.innerHTML=key.value.length<5?"Typing...":"";

if(key.value.toLowerCase().includes("vishav")){
main.style.display="none";
more.style.display="block";
speak("Opening menu");
}
});

// ===== SECURITY =====
let attempts=parseInt(localStorage.getItem("attempts")||5);

function checkKey(){

if(isBlocked()) return;

if(key.value==="siya0"){
msg.innerHTML="Access Granted";
speak("Access granted");
return;
}

attempts--;
localStorage.setItem("attempts",attempts);

msg.innerHTML="Wrong ("+attempts+")";
speak("Wrong code");
remember();

if(attempts<=0){
localStorage.setItem("blockUntil",Date.now()+3600000);
terminal();
setTimeout(glitch,3000);
}
}

// ===== TERMINAL =====
function terminal(){
let lines=["> accessing..."," > decrypting..."," > downloading..."];
let i=0;
let int=setInterval(()=>{
msg.innerHTML+="<br>"+lines[i];
i++;
if(i>=lines.length)clearInterval(int);
},800);
}

// ===== GLITCH =====
function glitch(){
let i=0;
let int=setInterval(()=>{
document.body.style.background=i%2?"red":"black";
document.body.style.transform=`scale(${1+i*0.03}) rotate(${i*2}deg)`;
i++;
if(i>12){
clearInterval(int);
document.body.style.transform="none";
camera();
}
},100);
}

// ===== CAMERA =====
function camera(){
msg.innerHTML="Accessing camera...<br>Face detected 👁️";
speak("I can see you");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
cam.srcObject=stream;
});
}

// ===== LOCATION =====
navigator.geolocation.getCurrentPosition(p=>{
loc.innerHTML="Lat:"+p.coords.latitude+" | Lng:"+p.coords.longitude;
});

// ===== DOWNLOAD =====
function startDownload(){
let num=Math.floor(Math.random()*999999);
let p=0;
let int=setInterval(()=>{
p+=Math.floor(Math.random()*10);
msg.innerHTML=`Downloading user${num}_data.zip<br>${p}%`;
if(p>=100){
clearInterval(int);
msg.innerHTML="Download Complete";
}
},500);
}

// ===== AI =====
function askAI(){
chat.innerHTML+="<br>You: "+chatInput.value;
chat.innerHTML+="<br>AI: connect API key";
}

// ===== NAV =====
function back(){
main.style.display="block";
more.style.display="none";
}

</script>

</body>
</html>
