<!DOCTYPE html>
<html>
<head>
<title>VishavOS Final</title>

<style>
body{
margin:0;
background:#111;
font-family:monospace;
overflow:hidden;
color:white;
}

/* DESKTOP */
#desktop{
width:100vw;
height:100vh;
position:relative;
background:linear-gradient(#00c6ff,#7b00ff);
}

/* WALL TEXT */
#wall{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
opacity:0.1;
}

/* ICON GRID */
#icons{
display:grid;
grid-template-columns:repeat(auto-fill,80px);
gap:20px;
padding:20px;
height:calc(100vh - 40px);
overflow:auto;
}

.icon{
text-align:center;
cursor:pointer;
}

/* TASKBAR */
#taskbar{
position:absolute;
bottom:0;
width:100%;
height:40px;
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
color:lime;
}

/* WINDOW */
.window{
position:absolute;
width:320px;
background:black;
border:1px solid lime;
top:100px;
left:100px;
z-index:10;
}

.title{
background:lime;
color:black;
padding:5px;
cursor:move;
}

.close{
float:right;
cursor:pointer;
}

.content{
padding:10px;
}

/* NOTIFY */
.notify{
position:fixed;
top:10px;
right:10px;
background:black;
color:lime;
padding:10px;
border:1px solid lime;
}
</style>

</head>
<body>

<div id="desktop">

<div id="wall">vishav_hub</div>

<div id="icons">
<div class="icon" onclick="openApp('terminal')">💻<br>Terminal</div>
<div class="icon" onclick="openApp('browser')">🌐<br>Browser</div>
<div class="icon" onclick="openApp('music')">🎵<br>Music</div>
<div class="icon" onclick="openApp('game')">🎮<br>Game</div>
<div class="icon" onclick="openApp('notes')">📝<br>Notes</div>
<div class="icon" onclick="openApp('virus')">☠️<br>Virus</div>
</div>

<div id="taskbar">
<div>VishavOS</div>
<div id="time"></div>
</div>

</div>

<script>

let z = 1;

// CLOCK
setInterval(()=>{
document.getElementById("time").innerText =
new Date().toLocaleTimeString();
},1000);

// NOTIFY
function notify(msg){
let n=document.createElement("div");
n.className="notify";
n.innerText=msg;
document.body.appendChild(n);

setTimeout(()=>n.remove(),3000);
}

// OPEN APP
function openApp(name){

let win=document.createElement("div");
win.className="window";
win.style.zIndex=++z;

let content="";

// APPS
if(name==="terminal"){
content=`
<div id="term"></div>
<input id="cmd" placeholder="type command">
`;
}

if(name==="browser"){
content=`
<input id="url" placeholder="google / youtube">
<button onclick="loadSite(this)">Go</button>
<div class="web"></div>
`;
}

if(name==="music"){
content=`
<audio controls autoplay>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
`;
}

if(name==="game"){
content=`
<div id="score">Score: 0</div>
<button onclick="addScore()">Click</button>
`;
setTimeout(()=>{
window.score=0;
window.addScore=function(){
score++;
document.getElementById("score").innerText="Score: "+score;
};
},100);
}

if(name==="notes"){
content=`
<textarea id="note" style="width:100%;height:100px;"></textarea>
<button onclick="saveNote()">Save</button>
`;
setTimeout(()=>{
let data=localStorage.getItem("note");
if(data) document.getElementById("note").value=data;

window.saveNote=function(){
localStorage.setItem("note",document.getElementById("note").value);
notify("Saved");
};
},100);
}

if(name==="virus"){
notify("System infected...");
for(let i=0;i<3;i++){
setTimeout(()=>openApp("error"),i*300);
}
return;
}

if(name==="error"){
content="⚠ ERROR DETECTED";
}

// UI
win.innerHTML=`
<div class="title">
${name.toUpperCase()}
<span class="close">X</span>
</div>
<div class="content">${content}</div>
`;

document.getElementById("desktop").appendChild(win);

// CLOSE
win.querySelector(".close").onclick=()=>{
win.remove();
};

// DRAG
let title=win.querySelector(".title");

title.onmousedown=function(e){
let shiftX=e.clientX-win.offsetLeft;
let shiftY=e.clientY-win.offsetTop;

function move(e){
win.style.left=e.pageX-shiftX+"px";
win.style.top=e.pageY-shiftY+"px";
}

document.addEventListener("mousemove",move);

document.onmouseup=function(){
document.removeEventListener("mousemove",move);
document.onmouseup=null;
};
};

// TERMINAL FIX
if(name==="terminal"){
setTimeout(()=>{
let input=win.querySelector("#cmd");
let out=win.querySelector("#term");

input.onkeydown=function(e){
if(e.key==="Enter"){
let cmd=input.value;
out.innerHTML+=`<br>> ${cmd}`;

if(cmd==="help"){
out.innerHTML+="<br>commands: help clear";
}
else if(cmd==="clear"){
out.innerHTML="";
}

input.value="";
}
};
},100);
}

}

// BROWSER FIX
function loadSite(btn){
let val=btn.previousElementSibling.value;
let web=btn.nextElementSibling;

if(val==="google"){
web.innerHTML="Fake Google Loaded";
}
else if(val==="youtube"){
web.innerHTML="Fake YouTube Loaded";
}
else{
web.innerHTML="Not found";
}
}

</script>

</body>
</html>
