<!DOCTYPE html>
<html>
<head>
<title>VishavX FINAL</title>

<style>
body{
margin:0;
background:black;
color:#0f0;
font-family:monospace;
text-align:center;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#panel{
position:fixed;
left:0;
top:0;
font-size:12px;
color:red;
padding:10px;
text-align:left;
}

#username{
position:fixed;
right:10px;
top:10px;
color:lime;
}

#menuBtn{
position:fixed;
right:10px;
top:50%;
background:black;
color:lime;
border:1px solid lime;
padding:10px;
cursor:pointer;
}

button,input{
padding:10px;
margin:5px;
background:black;
color:lime;
border:1px solid lime;
}
</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div id="panel"></div>
<div id="username"></div>

<div id="menuBtn" onclick="openMenu()">☰ MORE</div>

<div id="intro"></div>

<div id="main" style="display:none;">
<h2>VISHAVX SYSTEM</h2>

<input id="key" placeholder="Enter code">
<button onclick="checkKey()">Confirm</button>

<div id="msg"></div>
</div>

<div id="more" style="display:none;">
<h2>MORE MENU</h2>

<input id="chatInput">
<button onclick="askAI()">Send</button>
<div id="chat"></div>

<button onclick="startDownload()">Accept</button>
<div id="moreMsg"></div>

<button onclick="back()">Back</button>
</div>

<script>

window.onload = function(){

// ===== USER =====
let name = localStorage.getItem("name");
if(!name){
name = prompt("Enter your name");
localStorage.setItem("name",name);
}
document.getElementById("username").innerHTML="user_"+name;

// ===== INTRO =====
let intro=document.getElementById("intro");
let txt=["Initializing system...","Loading modules...","Access granted..."];
let i=0,j=0;

function introAnim(){
if(i<txt.length){
if(j<txt[i].length){
intro.innerHTML+=txt[i][j];
j++;setTimeout(introAnim,40);
}else{
intro.innerHTML+="<br>";
i++;j=0;
setTimeout(introAnim,300);
}
}
}
introAnim();

setTimeout(()=>{
intro.style.display="none";
document.getElementById("main").style.display="block";
loadInfo();
},3000);

// ===== MATRIX =====
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");

c.height=window.innerHeight;
c.width=window.innerWidth;

let letters="01".split("");
let drops=[];

for(let x=0;x<c.width/14;x++){
drops[x]=1;
}

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0F0";

drops.forEach((y,i)=>{
ctx.fillText(letters[Math.random()*2|0],i*14,y);
drops[i]=y>c.height||Math.random()>0.975?0:y+14;
});
},33);

// ===== DEVICE INFO =====
function loadInfo(){
let device = navigator.userAgent.includes("Android") ? "Android" : "iOS";

document.getElementById("panel").innerHTML=`
ACCESSING SYSTEM...<br>
Device: ${device}<br>
Internet: High Speed Internet<br>
Time: ${new Date().toLocaleTimeString()}
`;
}

// ===== SECURITY =====
let attempts=5;
let blocked=false;

window.checkKey=function(){

let msg=document.getElementById("msg");

if(blocked) return;

msg.innerHTML="Synchronizing...";

setTimeout(()=>{

if(document.getElementById("key").value==="siya0"){
openMenu();
return;
}

attempts--;
msg.innerHTML="Wrong ("+attempts+")";

if(attempts<=0){
startBlock();
}

},1500);

};

// ===== GLITCH BLOCK =====
function startBlock(){

let msg=document.getElementById("msg");

blocked=true;
let time=30;

let timer=setInterval(()=>{
msg.innerHTML=`🔒 BLOCKED ${time}s`;
time--;

if(time<=0){
clearInterval(timer);
blocked=false;
attempts=5;
msg.innerHTML="Retry";
}
},1000);

let steps=0;

let glitch=setInterval(()=>{

document.body.style.transform =
`translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)
scale(${1+Math.random()*0.2})
rotate(${Math.random()*10-5}deg)`;

let colors=["black","pink","white"];
document.body.style.background=colors[Math.floor(Math.random()*colors.length)];

let chars="█▓▒░<>/\\{}[]#@$%&*!?";
let text="";
for(let i=0;i<30;i++){
text+=chars[Math.floor(Math.random()*chars.length)];
}
msg.innerHTML=text;

steps++;

if(steps>25){
clearInterval(glitch);
document.body.style.transform="none";
document.body.style.background="black";

msg.innerHTML="...";
setTimeout(()=>{
cameraPhase();
},800);
}

},80);

}

// ===== FAKE CAMERA =====
function cameraPhase(){

let msg=document.getElementById("msg");

msg.innerHTML=`
Initializing camera...<br>
Scanning...<br>
Face detected 👁️
`;

setTimeout(()=>{
let s=new SpeechSynthesisUtterance("I can see you");
speechSynthesis.speak(s);
},1000);

}

// ===== MENU CONTROL =====
window.openMenu=function(){
document.getElementById("main").style.display="none";
document.getElementById("more").style.display="block";
};

window.back=function(){
document.getElementById("main").style.display="block";
document.getElementById("more").style.display="none";
};

// ===== DOWNLOAD =====
window.startDownload=function(){

let box=document.getElementById("moreMsg");
let num=Math.floor(Math.random()*999999);
let p=0;

let int=setInterval(()=>{
p+=Math.floor(Math.random()*10);

box.innerHTML=`Downloading user${num}_data.zip<br>${p}%`;

if(p>=100){
clearInterval(int);
box.innerHTML="Completed";
}
},500);

};

// ===== AI =====
window.askAI=function(){

let chat=document.getElementById("chat");
let input=document.getElementById("chatInput");

chat.innerHTML+="<br>You: "+input.value;
chat.innerHTML+="<br>AI: Ready";

};

};
</script>

</body>
</html>
