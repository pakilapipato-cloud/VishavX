<!DOCTYPE html>
<html>
<head>
<title>VishavX</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  text-align:center;
}

.glow{
  font-size:32px;
  margin-top:100px;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 5px #00ff00;}
  to{text-shadow:0 0 25px #00ff00;}
}

.loader{
  margin:40px auto;
  border:3px solid #111;
  border-top:3px solid #00ff00;
  width:50px;
  height:50px;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.box{
  display:none;
  margin-top:30px;
}

input{
  padding:10px;
  background:black;
  border:1px solid red;
  color:red;
  text-align:center;
}

button{
  padding:10px 15px;
  background:red;
  color:black;
  border:none;
  margin-top:10px;
}

.error{
  color:red;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="glow">WELCOME TO VISHAVX</div>

<div class="loader"></div>

<div class="box" id="box">
  <p style="color:red;">Enter 4 digit code</p>

  <input id="key" maxlength="4" placeholder="####">
  <br>

  <button onclick="checkKey()">Confirm</button>

  <div id="msg" class="error"></div>
</div>

<script>
setTimeout(function(){
  document.querySelector('.loader').style.display='none';
  document.getElementById('box').style.display='block';
},3000);

function checkKey(){
  var val = document.getElementById('key').value;

  if(val.length !== 4){
    document.getElementById('msg').innerHTML = "Enter 4 digit code!";
  } else {
    document.getElementById('msg').innerHTML = "Your code is incorrect, try again...";
  }
}
</script>

</body>
</html>
