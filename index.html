<!DOCTYPE html>
<html>
<head>
<title>VishavX GOD MODE</title>

<style>
body{margin:0;background:black;color:#0f0;font-family:Courier New;text-align:center;overflow:hidden;}
canvas{position:fixed;top:0;left:0;z-index:-1;}

#panel{
position:fixed;
left:10px;
top:10px;
color:red;
background:rgba(0,0,0,0.6);
padding:10px;
border:1px solid red;
border-radius:10px;
font-size:12px;
}

#username{
position:fixed;
right:10px;
top:10px;
color:lime;
}

#menuBtn{
position:fixed;
right:0;
top:50%;
transform:translateY(-50%);
padding:12px;
background:black;
color:lime;
border-left:2px solid lime;
cursor:pointer;
z-index:1000;
}

#main{margin-top:120px;}

#more{
position:fixed;
right:-100%;
top:0;
width:80%;
height:100%;
background:black;
border-left:2px solid lime;
transition:0.4s;
padding-top:50px;
z-index:999;
}

#more.active{right:0;}

input,button{
padding:10px;
margin:8px;
background:black;
color:lime;
border:1px solid lime;
}

button:hover{background:lime;color:black;}

h2{animation:glitch .5s infinite;}
@keyframes glitch{
0%{text-shadow:2px 2px red;}
50%{text-shadow:-2px -2px lime;}
100%{text-shadow:2px -2px blue;}
}
</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div id="panel"></div>
<div id="username"></div>

<div id="menuBtn" onclick="openMenu()">☰ MORE</div>

<div id="intro"></div>

<div id="main" style="display:none;">
<h2>VISHAVX SYSTEM</h2>

<input id="key" placeholder="Enter code">
<button onclick="checkKey()">Confirm</button>

<div id="msg"></div>
</div>

<div id="more">
<h2>CONTROL PANEL</h2>

<input id="chatInput">
<button onclick="askAI()">Send</button>
<div id="chat"></div>

<button onclick="startDownload()">Download</button>
<button onclick="performanceTest()">Performance Test</button>
<button onclick="mode3am()">3AM Mode</button>
<button onclick="distortion()">SYSTEM DISTORTION</button>

<div id="moreMsg"></div>

<button onclick="back()">Back</button>
</div>

<script>

window.onload=function(){

// USER
let name=localStorage.getItem("name");
if(!name){
name=prompt("Enter your name");
localStorage.setItem("name",name);
}
username.innerHTML="user_"+name;

// INTRO
let intro=document.getElementById("intro");
let txt=["Initializing...","Loading modules...","Access granted"];
let i=0,j=0;

function anim(){
if(i<txt.length){
if(j<txt[i].length){
intro.innerHTML+=txt[i][j];
j++;setTimeout(anim,40);
}else{
intro.innerHTML+="<br>";i++;j=0;setTimeout(anim,300);
}}
}
anim();

setTimeout(()=>{
intro.style.display="none";
main.style.display="block";
loadInfo();
},3000);

// MATRIX
let c=matrix,ctx=c.getContext("2d");
c.height=innerHeight;c.width=innerWidth;
let letters="01".split(""),drops=[];
for(let x=0;x<c.width/14;x++)drops[x]=1;

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0F0";
drops.forEach((y,i)=>{
ctx.fillText(letters[Math.random()*2|0],i*14,y);
drops[i]=y>c.height||Math.random()>0.975?0:y+14;
});
},33);

// DEVICE PANEL
async function loadInfo(){
let device=navigator.userAgent.includes("Android")?"Android":"iOS";
let res=screen.width+" x "+screen.height;
let tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
let lang=navigator.language;
let net=navigator.onLine?"Online":"Offline";
let cores=navigator.hardwareConcurrency||4;

let cpu=cores>=8?"High Performance CPU":
        cores>=4?"Mid Performance CPU":"Basic CPU";

let battery="Unknown";
if(navigator.getBattery){
let b=await navigator.getBattery();
battery=Math.floor(b.level*100)+"%";
}

panel.innerHTML=`
Device: ${device}<br>
Resolution: ${res}<br>
Timezone: ${tz}<br>
Location: Jammu<br>
Language: ${lang}<br>
Network: ${net}<br>
CPU: ${cpu}<br>
Battery: ${battery}<br>
Time: ${new Date().toLocaleTimeString()}
`;
}

// SECURITY
let attempts=5;
let blocked=false;

window.checkKey=function(){
let msg=document.getElementById("msg");

if(blocked) return;

msg.innerHTML="Synchronizing...";

setTimeout(()=>{
if(key.value==="siya0"){openMenu();return;}

attempts--;
msg.innerHTML="Wrong ("+attempts+")";

if(attempts<=0){blockSystem();}
},1500);
};

// GLITCH BLOCK
function blockSystem(){

let msg=document.getElementById("msg");
blocked=true;
let time=30;

let timer=setInterval(()=>{
msg.innerHTML=`BLOCKED ${time}s`;
time--;

if(time<=0){
clearInterval(timer);
blocked=false;
attempts=5;
msg.innerHTML="Retry";
}
},1000);

let steps=0;

let glitch=setInterval(()=>{
document.body.style.transform=
`translate(${Math.random()*20-10}px,${Math.random()*20-10}px)
scale(${1+Math.random()*0.2})
rotate(${Math.random()*10-5}deg)`;

document.body.style.background=
["black","pink","white"][Math.floor(Math.random()*3)];

let chars="█▓▒░<>/\\{}[]#@$%&*!?";
let t="";
for(let i=0;i<30;i++){
t+=chars[Math.floor(Math.random()*chars.length)];
}
msg.innerHTML=t;

steps++;

if(steps>25){
clearInterval(glitch);
document.body.style.transform="none";
document.body.style.background="black";

msg.innerHTML="...";
setTimeout(cameraPhase,800);
}

},80);
}

// CAMERA FAKE
function cameraPhase(){
msg.innerHTML="Initializing camera...<br>Face detected";
setTimeout(()=>{
speechSynthesis.speak(new SpeechSynthesisUtterance("I can see you"));
},1000);
}

// MENU
window.openMenu=()=>more.classList.add("active");
window.back=()=>more.classList.remove("active");

// DOWNLOAD
window.startDownload=function(){
let p=0,num=Math.floor(Math.random()*999999);
let box=document.getElementById("moreMsg");

let int=setInterval(()=>{
p+=Math.floor(Math.random()*10);
box.innerHTML=`Downloading user${num}.zip<br>${p}%`;
if(p>=100){clearInterval(int);box.innerHTML="Completed";}
},500);
};

// AI
window.askAI=function(){
chat.innerHTML+="<br>You: "+chatInput.value;
chat.innerHTML+="<br>AI: Ready";
};

// PERFORMANCE TEST
function performanceTest(){
let start=performance.now(),frames=0;

function loop(){
frames++;
if(performance.now()-start<1000){
requestAnimationFrame(loop);
}else{
moreMsg.innerHTML=`FPS: ${frames}`;
}
}
loop();
}

// 3AM MODE
function mode3am(){
if(new Date().getHours()!=3){
alert("Only at 3AM");return;
}

setInterval(()=>{
speechSynthesis.speak(
new SpeechSynthesisUtterance("I see you")
);
},3000);
}

// DISTORTION FINAL
function distortion(){
document.body.innerHTML="<h1 style='color:white;'>SYSTEM IS DESTROYED</h1>";
document.body.style.background="#555";
}

};
</script>

</body>
</html>
