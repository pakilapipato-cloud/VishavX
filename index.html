<!DOCTYPE html>
<html>
<head>
<title>VishavX ULTIMATE</title>

<style>
body{
margin:0;
background:black;
color:#0f0;
font-family:Courier New;
text-align:center;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* PANEL */
#panel{
position:fixed;
left:10px;
top:10px;
color:red;
background:rgba(0,0,0,0.5);
padding:10px;
border:1px solid red;
border-radius:10px;
}

/* USER */
#username{
position:fixed;
right:10px;
top:10px;
color:lime;
}

/* MENU BUTTON */
#menuBtn{
position:fixed;
right:0;
top:50%;
transform:translateY(-50%);
padding:12px;
background:black;
color:lime;
border-left:2px solid lime;
cursor:pointer;
}

/* MAIN */
#main{
margin-top:120px;
}

/* SLIDE MENU */
#more{
position:fixed;
right:-100%;
top:0;
width:80%;
height:100%;
background:black;
border-left:2px solid lime;
transition:0.4s;
padding-top:50px;
}

#more.active{
right:0;
}

/* INPUT */
input{
padding:10px;
margin:8px;
background:black;
color:lime;
border:1px solid lime;
}

/* BUTTON */
button{
padding:10px;
margin:8px;
background:black;
color:lime;
border:1px solid lime;
cursor:pointer;
}

button:hover{
background:lime;
color:black;
}

/* GLITCH */
h2{
animation:glitch .5s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 2px red;}
50%{text-shadow:-2px -2px lime;}
100%{text-shadow:2px -2px blue;}
}
</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div id="panel"></div>
<div id="username"></div>

<div id="menuBtn" onclick="openMenu()">☰</div>

<div id="intro"></div>

<div id="main" style="display:none;">
<h2>VISHAVX SYSTEM</h2>

<input id="key" placeholder="Enter code">
<button onclick="checkKey()">Confirm</button>

<div id="msg"></div>
</div>

<div id="more">
<h2>MORE</h2>

<input id="chatInput">
<button onclick="askAI()">Send</button>
<div id="chat"></div>

<button onclick="startDownload()">Accept</button>
<div id="moreMsg"></div>

<button onclick="back()">Back</button>
</div>

<script>

window.onload=function(){

// USER
let name=localStorage.getItem("name");
if(!name){
name=prompt("Enter your name");
localStorage.setItem("name",name);
}
username.innerHTML="user_"+name;

// INTRO
let intro=document.getElementById("intro");
let txt=["Initializing...","Loading modules...","Access granted"];
let i=0,j=0;

function anim(){
if(i<txt.length){
if(j<txt[i].length){
intro.innerHTML+=txt[i][j];
j++;setTimeout(anim,40);
}else{
intro.innerHTML+="<br>";i++;j=0;setTimeout(anim,300);
}}
}
anim();

setTimeout(()=>{
intro.style.display="none";
main.style.display="block";
loadInfo();
},3000);

// MATRIX
let c=matrix,ctx=c.getContext("2d");
c.height=innerHeight;c.width=innerWidth;
let letters="01".split(""),drops=[];
for(let x=0;x<c.width/14;x++)drops[x]=1;

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0F0";
drops.forEach((y,i)=>{
ctx.fillText(letters[Math.random()*2|0],i*14,y);
drops[i]=y>c.height||Math.random()>0.975?0:y+14;
});
},33);

// INFO
function loadInfo(){
let device=navigator.userAgent.includes("Android")?"Android":"iOS";
panel.innerHTML=`
Device: ${device}<br>
Internet: High Speed<br>
Time: ${new Date().toLocaleTimeString()}
`;
}

// SECURITY
let attempts=5;
let blocked=false;

window.checkKey=function(){

let msg=document.getElementById("msg");

if(blocked) return;

msg.innerHTML="Synchronizing...";

setTimeout(()=>{

if(key.value==="siya0"){
openMenu();
return;
}

attempts--;
msg.innerHTML="Wrong ("+attempts+")";

if(attempts<=0){
blockSystem();
}

},1500);
};

// BLOCK + GLITCH
function blockSystem(){

let msg=document.getElementById("msg");

blocked=true;
let time=30;

let timer=setInterval(()=>{
msg.innerHTML=`BLOCKED ${time}s`;
time--;

if(time<=0){
clearInterval(timer);
blocked=false;
attempts=5;
msg.innerHTML="Retry";
}
},1000);

let steps=0;

let glitch=setInterval(()=>{

document.body.style.transform=
`translate(${Math.random()*20-10}px,${Math.random()*20-10}px)
scale(${1+Math.random()*0.2})
rotate(${Math.random()*10-5}deg)`;

document.body.style.background=
["black","pink","white"][Math.floor(Math.random()*3)];

let chars="█▓▒░<>/\\{}[]#@$%&*!?";
let t="";
for(let i=0;i<30;i++){
t+=chars[Math.floor(Math.random()*chars.length)];
}
msg.innerHTML=t;

steps++;

if(steps>25){
clearInterval(glitch);
document.body.style.transform="none";
document.body.style.background="black";

msg.innerHTML="...";
setTimeout(cameraPhase,800);
}

},80);
}

// FAKE CAMERA
function cameraPhase(){

let msg=document.getElementById("msg");

msg.innerHTML=`
Initializing camera...<br>
Scanning...<br>
Face detected 👁️
`;

setTimeout(()=>{
let s=new SpeechSynthesisUtterance("I can see you");
speechSynthesis.speak(s);
},1000);

}

// MENU
window.openMenu=function(){
document.getElementById("more").classList.add("active");
};

window.back=function(){
document.getElementById("more").classList.remove("active");
};

// DOWNLOAD
window.startDownload=function(){
let box=document.getElementById("moreMsg");
let p=0;
let num=Math.floor(Math.random()*999999);

let int=setInterval(()=>{
p+=Math.floor(Math.random()*10);
box.innerHTML=`Downloading user${num}.zip<br>${p}%`;

if(p>=100){
clearInterval(int);
box.innerHTML="Completed";
}
},500);
};

// AI
window.askAI=function(){
chat.innerHTML+="<br>You: "+chatInput.value;
chat.innerHTML+="<br>AI: Ready";
};

};
</script>

</body>
</html>
